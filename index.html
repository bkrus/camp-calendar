  .week-card.partial-blocked { border-left-color: #f6ad55; }
  .week-card.available      { border-left-color: #68d391; }
  .week-card.has-suggestions { border-left-color: #63b3ed; }
  .week-card.decided        { border-left-color: #b794f4; }

    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
  }
  .week-dates { font-weight: 600; font-size: 0.95rem; }
  .week-badge {
    font-size: 0.75rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;

  .badge-available { background: #c6f6d5; color: #276749; }
  .badge-camps     { background: #bee3f8; color: #2b6cb0; }
  .badge-decided   { background: #e9d8fd; color: #553c9a; }

  .week-body {
    padding: 0 16px 14px;
    border-top: 1px solid #f7fafc;
  }
  .blocked-reason {
    font-size: 0.88rem;
    color: #c53030;
    padding-top: 10px;
  }
  .week-decided-note {

    padding-top: 10px;

  }

    color: #a0aec0;
    padding-top: 14px;

    display: grid;

    padding-top: 8px;

  .camp-tile {

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
  catch(e) { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function campsForWeek(weekId) {
  return CAMPS_DATA.camps.filter(function(c) {
    return c.weeks && c.weeks.indexOf(weekId) !== -1;
  });
}

function init() {
  renderCalendar();
}

function renderCalendar() {
  var state = loadState();
  var CAL = document.getElementById("calendar");
  CAL.innerHTML = "";

  var months = [];
  WEEKS.forEach(function(w) {
    if (months.indexOf(w.month) === -1) months.push(w.month);
  });

  months.forEach(function(month) {
    var section = document.createElement("div");
    section.className = "month-section";
    section.innerHTML = '<div class="month-header">' + month + "</div>";

    WEEKS.filter(function(w) { return w.month === month; }).forEach(function(week) {
      var suggested = week.id ? campsForWeek(week.id) : [];
      var customList = (week.id && state[week.id + "_custom"]) || [];
      var interestedId = week.id ? (state[week.id + "_interested"] || null) : null;

      var hasSuggested = suggested.length > 0;
      var hasHardCamps = week.camps && week.camps.length > 0;
      var isCollapsible = week.status !== "available" || hasHardCamps || hasSuggested || customList.length > 0;

      // Card class
      var cardClass = "week-card";
      if (week.status === "blocked" && week.partial) cardClass += " partial-blocked";
      else if (week.status === "blocked") cardClass += " blocked";
      else if (week.status === "decided") cardClass += " decided";
      else if (hasSuggested || customList.length > 0) cardClass += " has-suggestions";
      else cardClass += " available";
      if (isCollapsible) cardClass += " collapsible";

      // Badge
      var badgeCls, badgeLabel;
      if (week.status === "blocked" && !week.partial) {
        badgeCls = "badge-blocked"; badgeLabel = "Already planned";
      } else if (week.status === "blocked" && week.partial) {
        badgeCls = ""; badgeLabel = "";
      } else if (week.status === "decided") {
        badgeCls = "badge-decided"; badgeLabel = "Decided ✓";
      } else if (hasSuggested) {
        badgeCls = "badge-camps";
        badgeLabel = suggested.length + " camp" + (suggested.length !== 1 ? "s" : "") + " available";
      } else {
        badgeCls = "badge-available"; badgeLabel = "Open";
      }

      // Body content
      var body = "";

      if (week.status === "blocked") {
        body += '<div class="blocked-reason">🚫 ' + (week.blockedReason || "") + "</div>";
      }

      if (week.status === "decided") {
        body += '<div class="week-decided-note">✓ ' + (week.decidedNote || "") + "</div>";
      }

      // Hard-coded camps (e.g. Camp Lakewood picked)
      if (hasHardCamps) {
        body += '<div class="camps-grid">';
        week.camps.forEach(function(c) { body += buildCampTile(c, false, null); });
        body += "</div>";
      }

      // Suggested camps from camps.json (skip for fully blocked weeks)
      if (hasSuggested && (week.status !== "blocked" || week.partial)) {
        body += '<div class="camps-section-label">Suggested Camps — click to mark interest</div>';
        body += '<div class="camps-grid">';
        suggested.forEach(function(c) {
          var isInterested = interestedId === c.id;
          body += buildCampTile(c, isInterested, week.id);
        });
        body += "</div>";
      }

      // Custom camps
      if (customList.length > 0) {
        body += '<div class="camps-section-label">Custom Camps</div>';
        body += '<div class="camps-grid">';
        customList.forEach(function(c) {
          body += buildCampTile(c, false, null);
        });
        body += "</div>";
      }

      if (week.status === "available" && !hasSuggested && customList.length === 0) {
        body += '<div class="no-camps">No camps yet — add one below or check back as camps.json is updated.</div>';
      }

      // Add custom camp button (open weeks only)
      if (week.id && week.status !== "blocked" && week.status !== "decided") {
        body += '<div class="custom-camp-area">';
        body += '<button class="btn-add-custom" onclick="toggleForm(\'' + week.id + '\')">+ Add custom camp</button>';
        body += '<div id="form-' + week.id + '"></div>';
        body += "</div>";
      }

      var card = document.createElement("div");
      card.className = cardClass;
      card.innerHTML =
        '<div class="week-header">' +
          '<div class="week-header-left">' +
            '<span class="week-dates">' + week.dates + "</span>" +
          "</div>" +
          '<span class="week-badge ' + badgeCls + '">' + badgeLabel + "</span>" +
        "</div>" +
        '<div class="week-body">' + body + "</div>";

      if (isCollapsible) {
        card.querySelector(".week-header").addEventListener("click", function(e) {
          if (e.target.tagName === "BUTTON" || e.target.closest("button")) return;
          card.classList.toggle("open");
        });
        if (week.status === "decided" || hasSuggested) {
          card.classList.add("open");
        }
      }

      section.appendChild(card);
    });

    CAL.appendChild(section);
  });
}

function buildCampTile(camp, isInterested, weekId) {
  var isPicked = camp.picked === true;
  var price = camp.priceDisplay || (camp.price ? "$" + camp.price : "");
  var clickAttr = (!isPicked && weekId && camp.id)
    ? ' onclick="toggleInterest(\'' + weekId + "','" + camp.id + '\')"'
    : "";
  var cls = "camp-tile" + (isPicked ? " picked" : "") + (isInterested ? " interested" : "");
  var badge = isPicked
    ? '<span class="tile-badge picked-badge">PICKED</span>'
    : (isInterested ? '<span class="tile-badge interest-badge">★ Interested</span>' : "");
  var meta = [camp.provider, camp.ages].filter(Boolean).join(" · ");

  return '<div class="' + cls + '"' + clickAttr + ">" +
    badge +
    '<div class="camp-name">' + camp.name + "</div>" +
    (meta ? '<div class="camp-meta">' + meta + "</div>" : "") +
    (camp.description ? '<div class="camp-desc">' + camp.description + "</div>" : "") +
    (camp.note ? '<div class="camp-note">' + camp.note + "</div>" : "") +
    '<div class="camp-footer">' +
      (price ? '<span class="camp-price">' + price + "</span>" : "") +
      (camp.url ? ' <a class="camp-link" href="' + camp.url + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">View site ↗</a>' : "") +
    "</div>" +
    "</div>";
}

function toggleInterest(weekId, campId) {
  var state = loadState();
  var key = weekId + "_interested";
  state[key] = state[key] === campId ? null : campId;
  saveState(state);
  renderCalendar();
  reopenWeek(weekId);
}

function toggleForm(weekId) {
  var el = document.getElementById("form-" + weekId);
  if (!el) return;
  if (el.innerHTML) { el.innerHTML = ""; return; }
  el.innerHTML =
    '<div class="custom-form">' +
      '<div class="form-row">' +
        '<input class="form-input" id="cf-name-' + weekId + '" placeholder="Camp name" />' +
        '<input class="form-input" id="cf-price-' + weekId + '" placeholder="Price e.g. $300" style="max-width:140px" />' +
      "</div>" +
      '<div class="form-row">' +
        '<input class="form-input" id="cf-desc-' + weekId + '" placeholder="Description (optional)" />' +
      "</div>" +
      '<div class="form-row">' +
        '<button class="btn-save" onclick="saveCustom(\'' + weekId + '\')">Save</button>' +
        '<button class="btn-cancel" onclick="document.getElementById(\'form-' + weekId + '\').innerHTML=\'\'">Cancel</button>' +
      "</div>" +
    "</div>";
}

function saveCustom(weekId) {
  var name = (document.getElementById("cf-name-" + weekId) || {}).value || "";
  var price = (document.getElementById("cf-price-" + weekId) || {}).value || "";
  var desc = (document.getElementById("cf-desc-" + weekId) || {}).value || "";
  name = name.trim();
  if (!name) { alert("Please enter a camp name."); return; }
  var state = loadState();
  var key = weekId + "_custom";
  if (!state[key]) state[key] = [];
  state[key].push({ name: name, priceDisplay: price.trim(), description: desc.trim(), id: "custom-" + Date.now() });
  saveState(state);
  renderCalendar();
  reopenWeek(weekId);
}

function reopenWeek(weekId) {
  setTimeout(function() {
    document.querySelectorAll(".week-card").forEach(function(card) {
      if (card.querySelector('[id="form-' + weekId + '"]') || card.querySelector('.camps-grid')) {
        var dates = card.querySelector(".week-dates");
        if (dates) {
          var week = WEEKS.find(function(w) { return w.id === weekId; });
          if (week && dates.textContent === week.dates) card.classList.add("open");
        }
      }
    });
  }, 0);
}

init();
</script>
</body>
</html>
